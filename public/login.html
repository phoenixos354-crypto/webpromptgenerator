<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebPrompt AI — Access</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border2: #2a2a3d;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --accent: #ff4d6d;
    --accent2: #ff8c42;
    --green: #00d68f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,77,109,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,109,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(48px); }
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }

  .orb-1 {
    width: 400px; height: 400px;
    background: rgba(255, 77, 109, 0.08);
    top: -100px; left: -100px;
    animation: orbFloat 8s ease-in-out infinite;
  }

  .orb-2 {
    width: 300px; height: 300px;
    background: rgba(124, 58, 237, 0.06);
    bottom: -80px; right: -80px;
    animation: orbFloat 10s ease-in-out infinite reverse;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 20px); }
  }

  /* CARD */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin: 24px;
    animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(24px);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* LOGO */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
    justify-content: center;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 20px;
    box-shadow: 0 0 24px rgba(255, 77, 109, 0.3);
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--muted);
    font-weight: 400;
    font-size: 18px;
  }

  /* HEADING */
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* FORM */
  .field-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .input-wrap input {
    width: 100%;
    background: #0d0d14;
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 14px 48px 14px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 3px;
    outline: none;
    transition: all 0.25s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.1);
  }

  .input-wrap input::placeholder {
    letter-spacing: 1px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }

  .eye-btn {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    padding: 2px;
  }

  .eye-btn:hover { color: var(--text); }

  /* SUBMIT BTN */
  .btn-submit {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-submit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-submit:hover::after { opacity: 0.08; }
  .btn-submit:active { transform: scale(0.99); }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* ERROR */
  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    background: rgba(255, 77, 109, 0.08);
    border: 1px solid rgba(255, 77, 109, 0.25);
    border-radius: 10px;
    font-size: 13px;
    color: var(--accent);
    text-align: center;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .error-msg.show { display: block; }

  /* LOADING SPINNER */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* LOCK ICON */
  .lock-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .lock-icon {
    width: 52px; height: 52px;
    background: rgba(255, 77, 109, 0.08);
    border: 1px solid rgba(255, 77, 109, 0.2);
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-size: 22px;
  }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">WebPrompt <span>AI</span></div>
  </div>

  <div class="lock-wrap">
    <div class="lock-icon">🔐</div>
  </div>

  <h1>Private Access</h1>
  <p class="subtitle">Tool ini hanya untuk penggunaan internal.<br>Masukkan password untuk melanjutkan.</p>

  <div class="field-label">Password</div>
  <div class="input-wrap">
    <input type="password" id="passwordInput" placeholder="Masukkan password..." autofocus
      onkeydown="if(event.key==='Enter') submitPassword()" />
    <button class="eye-btn" onclick="togglePwd()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitPassword()">
    <span id="btnText">Masuk →</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="error-msg" id="errorMsg">❌ Password salah. Coba lagi.</div>

  <div class="footer-note">🔒 Secured by Vercel Edge Middleware</div>
</div>

<script>
  function togglePwd() {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function submitPassword() {
    const pwd = document.getElementById('passwordInput').value.trim();
    if (!pwd) return;

    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    errorMsg.classList.remove('show');

    try {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });

      const data = await res.json();

      if (data.success) {
        btnText.textContent = '✓ Berhasil!';
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        btn.style.background = 'linear-gradient(135deg, #00d68f, #00b377)';
        setTimeout(() => { window.location.href = '/'; }, 600);
      } else {
        throw new Error('wrong');
      }
    } catch {
      btn.disabled = false;
      btnText.style.display = 'block';
      spinner.style.display = 'none';
      errorMsg.classList.add('show');
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }
</script>
</body>
</html>
